changelog:
    exclude:
        labels:
            - ignore-for-release  
    categories:
        - title: Breaking Changes
          labels:
              - breaking-change
        - title: New Features
          labels:
              - feature
              - enhancement
        - title: Fixes
          labels:
              - bug
              - fix
        - title: Documentation
          labels:
              - documentation
              - docs
        - title: Other Changes
          labels:
              - "*"