name: HACS validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    name: HACS
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate
        uses: hacs/action@v22
        with:
          category: plugin