name: HACS validation

on:
  pull_request:
  release:
    types:
      - published

jobs:
  hacs:
    runs-on: ubuntu-latest
    name: HACS
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate
        uses: hacs/action@22.5.0
        with:
          category: plugin
