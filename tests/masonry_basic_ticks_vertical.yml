type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertestmin
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Standard avec titre
    ticksactive: true
    ticks:
      digits: manual
      nbdigits: 3
      majorticks: 6
      minorticks: 2
    orientation: vertical
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Std sans titre
        heading_style: title
      - type: custom:flex-slider-card
        entity_min: input_number.inputnumbertestmin
        entity_max: input_number.inputnumbertestmax
        min: 18
        max: 30
        step: 0.5
        ticksactive: true
        ticks:
          majorticks: 4
          minorticks: 1
        orientation: vertical
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 10
    max: 40
    step: 1
    name: Compact avec titre
    format: compact
    ticksactive: true
    ticks:
      majorticks: 7
    orientation: vertical
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Compact sans titre
        heading_style: title
      - type: custom:flex-slider-card
        entity_min: input_number.inputnumbertestmin
        entity_max: input_number.inputnumbertestmax
        min: 10
        max: 40
        step: 1
        format: compact
        ticksactive: true
        ticks:
          majorticks: 5
          minorticks: 4
        orientation: vertical
theme: Caule Light Green
title: Masonry/basic/vertical
