    format: compact
    valuesbaractive: true
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Min
      maxtext: Max
    bubbles:
      unit: °C
      mintext: Min
      maxtext: Max
  - type: vertical-stack
