type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertest1
      - input_number.inputnumbertest2
      - input_number.inputnumbertest3
      - input_number.inputnumbertest4
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std
    valuesbaractive: false
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Inf
      maxtext: Sup
    bubbles:
      unit: °C
      mintext: Inf
      maxtext: Sup
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | VB
    valuesbaractive: true
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Inf
      maxtext: Sup
    bubbles:
      unit: °C
      mintext: Inf
      maxtext: Sup
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Std | no tit.
        heading_style: title
      - type: custom:flex-slider-card
        entities:
          - entity: input_number.inputnumbertest1
          - entity: input_number.inputnumbertest2
          - entity: input_number.inputnumbertest3
        min: 18
        max: 30
        step: 0.5
        bubblesactive: true
