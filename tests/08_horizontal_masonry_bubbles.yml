          - entity: input_number.inputnumbertest4
        min: 18
        max: 30
        step: 0.5
        valuesbaractive: true
        bubblesactive: true
        valuesbar:
          unit: °C
        bubbles:
          unit: °C
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
    min: 10
    max: 40
    step: 1
    name: Cmp | RTL
    format: compact
    bubblesactive: true
    direction: rtl
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
