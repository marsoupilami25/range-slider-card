type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertest1
      - input_number.inputnumbertest2
      - input_number.inputnumbertest3
      - input_number.inputnumbertest4
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
    min: 18
    max: 30
    step: 0.5
    name: Std | mod slider
    card_mod:
      style:
        flex-slider-card-slider$: |
          .slider-container.std {
            outline: 2px dashed var(--warning-color) !important;
          }
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | mod VB
    valuesbaractive: true
    valuesbar:
      unit: C
      mintext: Min
      maxtext: Max
    card_mod:
      style:
        flex-slider-card-valuesbar$: |
          .valuesbar {
            color: var(--error-color) !important;
            font-weight: 700;
          }
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
      - entity: input_number.inputnumbertest3
    min: 10
    max: 40
    step: 1
    name: Cmp | mod tip
    format: compact
    bubblesactive: true
    bubbles:
      unit: "%"
    card_mod:
      style:
        flex-slider-card-slider$: |
          .slider.compact .noUi-tooltip {
            background: var(--success-color) !important;
            color: black !important;
            border-color: var(--warning-color) !important;
          }
theme: Caule Light Gray
title: CSard_mod
