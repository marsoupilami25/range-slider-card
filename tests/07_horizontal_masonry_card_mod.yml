type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertestmin
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Std | mod slider
    card_mod:
      style:
        flex-slider-card-slider$: |
          .slider-container.std {
            outline: 2px dashed var(--warning-color) !important;
          }
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Std | mod VB
    valuesbaractive: true
    valuesbar:
      unit: C
      mintext: Min
      maxtext: Max
    card_mod:
      style:
        flex-slider-card-valuesbar$: |
          .valuesbar {
            color: var(--error-color);
            font-weight: 700;
          }
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 10
    max: 40
    step: 1
    name: Cmp | mod tip
    format: compact
    bubblesactive: true
    bubbles:
      unit: "%"
    card_mod:
      style:
        flex-slider-card-slider$: |
          .slider.compact .noUi-tooltip {
            background: var(--success-color);
            color: black;
            border-color: var(--warning-color);
          }
theme: Caule Light Gray
title: CSard_mod
