type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertestmin
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Std
    bubblesactive: true
    bubbles:
      unit: °C
      mintext: Inf
      maxtext: Sup
    orientation: vertical
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Std | no tit. | h3
        heading_style: title
      - type: custom:flex-slider-card
        entity_min: input_number.inputnumbertestmin
        entity_max: input_number.inputnumbertestmax
        min: 18
        max: 30
        step: 0.5
        bubblesactive: true
        orientation: vertical
        verticalheight: 3
        valuesbaractive: false
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 10
    max: 40
    step: 1
    name: Cmp | RTL
    format: compact
    bubblesactive: true
    direction: rtl
    orientation: vertical
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Cmp | no tit. | h3
        heading_style: title
      - type: custom:flex-slider-card
        entity_min: input_number.inputnumbertestmin
        entity_max: input_number.inputnumbertestmax
        min: 10
        max: 40
        step: 1
        format: compact
        bubblesactive: true
        orientation: vertical
        verticalheight: 3
        valuesbaractive: false
theme: Caule Light Purple
title: Bubbles
