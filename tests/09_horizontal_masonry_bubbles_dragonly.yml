    max: 40
    step: 1
    name: Cmp | on | RTL
    format: compact
    bubblesactive: true
    direction: rtl
    bubbles:
      unit: "%"
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
