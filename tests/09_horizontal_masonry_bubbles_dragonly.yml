type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertest1
      - input_number.inputnumbertest2
      - input_number.inputnumbertest3
      - input_number.inputnumbertest4
      - input_number.inputnumbertestref
    show_header_toggle: true
    state_color: false
  - type: heading
    icon: ""
    heading: Std | Bul vis.
    heading_style: title
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | on
    bubblesactive: true
    bubbles:
      unit: C
      mintext: Min
      maxtext: Max
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | drag
    bubblesactive: true
    bubbles:
      unit: C
      mintext: Min
      maxtext: Max
      dragonly: true
  - type: custom:flex-slider-card
    entity_min: input_datetime.inputheuretestmin
    entity_max: input_datetime.inputheuretestmax
    step: 15
    name: Std | drag | time
    bubblesactive: true
    bubbles:
      mintext: Start
      maxtext: End
      dragonly: true
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
        text: ""
      - entity: input_number.inputnumbertest2
        text: ""
    min: 18
    max: 30
    step: 0.5
    name: Std | Ref tip | on
    referenceactive: true
    reference:
      entity: input_number.inputnumbertestref
      text: Ref
      unit: C
      bubble: true
      valuesbar: false
      valuesbartextlarge: false
    bubblesactive: true
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
        text: ""
      - entity: input_number.inputnumbertest2
        text: ""
    min: 18
    max: 30
    step: 0.5
    name: Std | Ref tip | drag
    referenceactive: true
    reference:
      entity: input_number.inputnumbertestref
      text: Ref
      unit: C
      bubble: true
      valuesbar: false
      valuesbartextlarge: false
    bubbles:
      dragonly: true
    bubblesactive: true
  - type: heading
    icon: ""
    heading: Cmp | Bul vis.
    heading_style: title
