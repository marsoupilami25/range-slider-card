type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertestmin
    show_header_toggle: true
    state_color: false
  - type: heading
    icon: ""
    heading: Std | Bul vis.
    heading_style: title
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Std | on
    bubblesactive: true
    bubbles:
      unit: C
      mintext: Min
      maxtext: Max
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 18
    max: 30
    step: 0.5
    name: Std | drag
    bubblesactive: true
    bubbles:
      unit: C
      mintext: Min
      maxtext: Max
      dragonly: true
  - type: custom:flex-slider-card
    entity_min: input_datetime.inputheuretestmin
    entity_max: input_datetime.inputheuretestmax
    step: 15
    name: Std | drag | time
    bubblesactive: true
    bubbles:
      mintext: Start
      maxtext: End
      dragonly: true
  - type: heading
    icon: ""
    heading: Cmp | Bul vis.
    heading_style: title
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 10
    max: 40
    step: 1
    name: Cmp | on | RTL
    format: compact
    bubblesactive: true
    direction: rtl
    bubbles:
      unit: "%"
  - type: custom:flex-slider-card
    entity_min: input_number.inputnumbertestmin
    entity_max: input_number.inputnumbertestmax
    min: 10
    max: 40
    step: 1
    name: Cmp | drag | RTL
    format: compact
    bubblesactive: true
    direction: rtl
    bubbles:
      unit: "%"
      dragonly: true
theme: Caule Light Orange
title: Dragonly
