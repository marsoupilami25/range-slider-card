type: masonry
path: ""
cards:
  - type: entities
    entities:
      - input_number.inputnumbertest1
      - input_number.inputnumbertest2
      - input_number.inputnumbertest3
      - input_number.inputnumbertest4
    show_header_toggle: true
    state_color: false
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | 6/2
    ticksactive: true
    ticks:
      digits: manual
      nbdigits: 3
      majorticks: 6
      minorticks: 2
    valuesbaractive: false
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Inf
      maxtext: Sup
    bubbles:
      unit: °C
      mintext: Inf
      maxtext: Sup
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 18
    max: 30
    step: 0.5
    name: Std | VB
    ticksactive: true
    valuesbaractive: true
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Inf
      maxtext: Sup
    bubbles:
      unit: °C
      mintext: Inf
      maxtext: Sup
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Std | no tit. | 4/1
        heading_style: title
      - type: custom:flex-slider-card
        entities:
          - entity: input_number.inputnumbertest1
          - entity: input_number.inputnumbertest2
          - entity: input_number.inputnumbertest3
        min: 18
        max: 30
        step: 0.5
        bubblesactive: true
        ticksactive: true
        ticks:
          majorticks: 4
          minorticks: 1
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Std | no tit. | VB
        heading_style: title
      - type: custom:flex-slider-card
        entities:
          - entity: input_number.inputnumbertest1
          - entity: input_number.inputnumbertest2
          - entity: input_number.inputnumbertest3
          - entity: input_number.inputnumbertest4
        min: 18
        max: 30
        step: 0.5
        ticksactive: true
        valuesbaractive: true
        bubblesactive: true
        valuesbar:
          unit: °C
        bubbles:
          unit: °C
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
    min: 10
    max: 40
    step: 1
    name: Cmp | 7/0 | RTL
    format: compact
    bubblesactive: true
    ticksactive: true
    ticks:
      majorticks: 7
    direction: rtl
  - type: custom:flex-slider-card
    entities:
      - entity: input_number.inputnumbertest1
      - entity: input_number.inputnumbertest2
    min: 10
    max: 40
    step: 1
    name: Cmp | VB
    format: compact
    ticksactive: true
    valuesbaractive: true
    bubblesactive: true
    valuesbar:
      unit: °C
      mintext: Min
      maxtext: Max
    bubbles:
      unit: °C
      mintext: Min
      maxtext: Max
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Cmp | no tit. | 5/4
        heading_style: title
      - type: custom:flex-slider-card
        entities:
          - entity: input_number.inputnumbertest1
          - entity: input_number.inputnumbertest2
          - entity: input_number.inputnumbertest3
        min: 10
        max: 40
        step: 1
        format: compact
        bubblesactive: true
        ticksactive: true
        ticks:
          majorticks: 5
          minorticks: 4
  - type: vertical-stack
    cards:
      - type: heading
        icon: ""
        heading: Cmp | no tit. | d2 | VB
        heading_style: title
      - type: custom:flex-slider-card
        entities:
          - entity: input_number.inputnumbertest1
          - entity: input_number.inputnumbertest2
          - entity: input_number.inputnumbertest3
          - entity: input_number.inputnumbertest4
        min: 10
        max: 40
        step: 1
        format: compact
        ticksactive: true
        valuesbaractive: true
        bubblesactive: true
        valuesbar:
          unit: "%"
        bubbles:
          unit: "%"
        ticks:
          digits: manual
          nbdigits: 2
theme: Caule Light Purple
title: Ticks & Bubbles
